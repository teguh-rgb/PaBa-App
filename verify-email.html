<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="PaBa — Verifikasi Email" />
  <meta name="theme-color" content="#E07B39" />

  <title>PaBa — Verifikasi Email</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <style>
    :root {
      --c-accent: #E07B39;
      --c-bg: #FEFCF7;
      --c-text-primary: #1E1A14;
      --c-text-muted: #8C8479;
      --c-border: #E4DDD2;
      --c-success: #27AE60;
      --c-error: #C0392B;
      --sp-md: 1rem;
      --sp-lg: 1.5rem;
      --sp-xl: 2rem;
      --r-md: 12px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      font-size: 16px;
    }

    body {
      font-family: 'Lexend', 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, var(--c-bg) 0%, #F5EFE7 100%);
      color: var(--c-text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--sp-lg);
    }

    .verify-container {
      width: 100%;
      max-width: 480px;
      background: white;
      border-radius: var(--r-md);
      padding: var(--sp-xl);
      box-shadow: 0 8px 24px rgba(30, 26, 20, 0.12);
      text-align: center;
    }

    .verify-icon {
      font-size: 4rem;
      margin-bottom: var(--sp-lg);
      animation: spin 2s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .verify-icon.success {
      animation: none;
      font-size: 3.5rem;
    }

    .verify-icon.error {
      animation: none;
      font-size: 3rem;
    }

    .verify-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--c-accent);
      margin-bottom: var(--sp-md);
    }

    .verify-message {
      font-size: 1rem;
      color: var(--c-text-primary);
      margin-bottom: var(--sp-xl);
      line-height: 1.6;
    }

    .verify-info {
      background: #F0F4F8;
      border-left: 4px solid var(--c-accent);
      padding: var(--sp-md);
      border-radius: 6px;
      font-size: 0.875rem;
      color: var(--c-text-primary);
      margin-bottom: var(--sp-lg);
    }

    .verify-buttons {
      display: flex;
      gap: var(--sp-md);
      margin-top: var(--sp-lg);
    }

    .verify-btn {
      flex: 1;
      padding: 0.875rem;
      font-size: 1rem;
      font-weight: 600;
      font-family: inherit;
      background-color: var(--c-accent);
      color: white;
      border: none;
      border-radius: var(--r-md);
      cursor: pointer;
      transition: background-color 0.2s ease;
    }

    .verify-btn:hover {
      background-color: #C96A28;
    }

    .verify-btn:active {
      transform: scale(0.98);
    }

    .verify-btn.secondary {
      background-color: var(--c-border);
      color: var(--c-text-primary);
    }

    .verify-btn.secondary:hover {
      background-color: #D9D0C5;
    }

    .status-success {
      color: var(--c-success);
    }

    .status-error {
      color: var(--c-error);
    }

    .status-loading {
      color: var(--c-accent);
    }

    .console-log {
      background: #F5F5F5;
      border: 1px solid var(--c-border);
      border-radius: 6px;
      padding: var(--sp-md);
      font-size: 0.75rem;
      font-family: 'Courier New', monospace;
      color: var(--c-text-muted);
      max-height: 200px;
      overflow-y: auto;
      margin-top: var(--sp-lg);
      text-align: left;
    }

    .console-log-line {
      margin: 0.25rem 0;
      white-space: pre-wrap;
      word-break: break-word;
    }

    @media (max-width: 480px) {
      .verify-container {
        padding: var(--sp-lg);
      }

      .verify-title {
        font-size: 1.25rem;
      }

      .verify-buttons {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>

  <div class="verify-container">

    <!-- Icon -->
    <div id="verify-icon" class="verify-icon">⏳</div>

    <!-- Title -->
    <h1 id="verify-title" class="verify-title">Memproses Verifikasi</h1>

    <!-- Message -->
    <p id="verify-message" class="verify-message">
      Mohon tunggu kami sedang memproses verifikasi email Anda...
    </p>

    <!-- Info Box -->
    <div id="verify-info" class="verify-info" style="display: none;">
      <!-- Filled by JavaScript -->
    </div>

    <!-- Buttons -->
    <div id="verify-buttons" class="verify-buttons" style="display: none;">
      <button class="verify-btn" id="btn-home">Kembali ke Beranda</button>
      <button class="verify-btn secondary" id="btn-login">Login Ulang</button>
    </div>

    <!-- Debug Console -->
    <div id="console-log" class="console-log" style="display: none;"></div>

  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js" type="module"></script>
  <script src="auth.js" type="module"></script>
  <script type="module">
    import { handleEmailVerificationRedirect } from './auth.js';

    const DOM = {
      icon: document.getElementById('verify-icon'),
      title: document.getElementById('verify-title'),
      message: document.getElementById('verify-message'),
      info: document.getElementById('verify-info'),
      buttons: document.getElementById('verify-buttons'),
      btnHome: document.getElementById('btn-home'),
      btnLogin: document.getElementById('btn-login'),
      consoleLog: document.getElementById('console-log'),
    };

    // ============================================
    // Console Logging Helper
    // ============================================
    const consoleLogs = [];

    function addLog(message) {
      consoleLogs.push(message);
      console.log(message);

      // Update DOM
      const logLine = document.createElement('div');
      logLine.className = 'console-log-line';
      logLine.textContent = message;
      DOM.consoleLog.appendChild(logLine);

      // Auto-scroll to bottom
      DOM.consoleLog.scrollTop = DOM.consoleLog.scrollHeight;
    }

    // ============================================
    // Main Process
    // ============================================

    async function processEmailVerification() {
      try {
        addLog('[PaBa] 📍 Verification page loaded');
        addLog('[PaBa] 🌐 URL: ' + window.location.href);
        addLog('[PaBa] 🔐 Starting email verification process...\n');

        // Show console
        DOM.consoleLog.style.display = 'block';

        // Process verification redirect
        const result = await handleEmailVerificationRedirect();

        if (result.success) {
          // ✅ SUCCESS STATE
          addLog('\n[PaBa] ✅ ' + result.message);

          DOM.icon.textContent = '✅';
          DOM.icon.classList.add('success');
          DOM.title.textContent = 'Email Terverifikasi!';
          DOM.title.classList.add('status-success');
          DOM.message.textContent = 'Selamat! Email Anda telah berhasil diverifikasi. Kami sedang memindahkan Anda ke aplikasi...';

          // Show redirect info
          DOM.info.textContent = '⏱️ Mengalihkan ke halaman utama dalam 3 detik...';
          DOM.info.style.display = 'block';

          addLog('[PaBa] ⏱️ Auto-redirect in 3 seconds...');

        } else {
          // ❌ ERROR STATE
          addLog('\n[PaBa] ❌ ' + result.message);

          DOM.icon.textContent = '❌';
          DOM.icon.classList.add('error');
          DOM.title.textContent = 'Verifikasi Gagal';
          DOM.title.classList.add('status-error');
          DOM.message.textContent = result.message;

          // Show error info
          DOM.info.innerHTML = `
            <strong>Kemungkinan penyebab:</strong><br>
            • Link verifikasi sudah expired<br>
            • Email sudah diverifikasi sebelumnya<br>
            • Terjadi kesalahan teknis
          `;
          DOM.info.style.display = 'block';

          // Show action buttons
          showButtons();
          addLog('[PaBa] 🔘 Showing action buttons');
        }

      } catch (error) {
        // 🔴 EXCEPTION STATE
        addLog('\n[PaBa] 🔴 Exception: ' + error.message);
        addLog('[PaBa] Stack: ' + error.stack);

        DOM.icon.textContent = '⚠️';
        DOM.icon.classList.add('error');
        DOM.title.textContent = 'Terjadi Kesalahan';
        DOM.title.classList.add('status-error');
        DOM.message.textContent = 'Maaf, terjadi kesalahan dalam memproses verifikasi email Anda.';

        DOM.info.innerHTML = `
          <strong>Error Details:</strong><br>
          ${error.message}
        `;
        DOM.info.style.display = 'block';

        // Show action buttons
        showButtons();
      }
    }

    function showButtons() {
      DOM.buttons.style.display = 'flex';

      DOM.btnHome.addEventListener('click', () => {
        console.log('[PaBa] 🏠 Redirecting to home...');
        window.location.href = 'index.html';
      });

      DOM.btnLogin.addEventListener('click', () => {
        console.log('[PaBa] 🔐 Redirecting to login...');
        window.location.href = 'login.html';
      });
    }

    // Start verification process
    addLog('[PaBa] 📊 Verification Page Initialized');
    processEmailVerification();
  </script>

</body>
</html>
